<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM Prime Realty | Premium Spaces Jaipur</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- GSAP & ScrollTrigger for premium animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <!-- Lenis for smooth kinetic scrolling -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.39/dist/lenis.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        prime: {
                            pearl: '#F8F8F5',    // Minimalist alabaster base
                            surface: '#EFEFEA',  // Textured cool neutral
                            ink: '#111111',      // Deep luxurious slate
                            gold: '#B39369',     // Brushed champagne bronze
                            muted: '#8A8A8A'     // Balanced muted slate
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                    },
                    transitionTimingFunction: {
                        'expo': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            background-color: #F8F8F5;
            color: #111111;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            cursor: none;
        }

        /* Subtle Noise Overlay for editorial look */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Custom Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F8F8F5; }
        ::-webkit-scrollbar-thumb { background: #EFEFEA; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #B39369; }

        /* Custom Trail Cursor Elements */
        .cursor-dot {
            width: 6px; height: 6px;
            background-color: #111111;
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }
        .cursor-outline {
            width: 40px; height: 40px;
            border: 1px solid rgba(17, 17, 17, 0.2);
            border-radius: 50%;
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s, background-color 0.3s;
        }
        body:hover .cursor-outline.hovered {
            width: 70px; height: 70px;
            border-color: #B39369;
            background-color: rgba(179, 147, 105, 0.04);
            backdrop-filter: blur(1px);
        }

        @media (max-width: 768px) {
            body { cursor: auto; }
            .cursor-dot, .cursor-outline { display: none; }
        }

        /* Smooth marquee effect */
        .marquee-container { display: flex; overflow: hidden; white-space: nowrap; }
        .marquee-content { display: flex; animation: marquee 25s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .glass-modal { background: rgba(248, 248, 245, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .glass-panel { background: rgba(239, 239, 234, 0.9); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto; }
        .lenis.lenis-smooth [data-lenis-prevent] { overscroll-behavior: contain; }
        .lenis.lenis-stopped { overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div class="noise-overlay"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Connect directly to the high-performance isolated live database
        window.FirebaseConnector = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, getDoc, setDoc, onSnapshot
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef } = React;
        gsap.registerPlugin(ScrollTrigger);

        // Curated Luxury Presets (Backup Layout Fallbacks)
        const INITIAL_DEFAULT_CONFIG = {
            hero: {
                titleLine1: "Curated",
                titleLine2: "Spaces.",
                subtitle: "Jaipur's most exclusive ready-to-move premium infrastructure.",
                bgImage: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=2000"
            },
            vision: {
                tagline: "The Vision",
                headline: "Time is your most expensive asset. Kyu waste karna mahino interior design aur contractor ke delays mein?",
                description: "Plug & Play. Elite spaces, designed for peak performance. You bring the vision, we provide the headquarters. Experience architectural grandeur without the friction of construction delays."
            },
            founder: {
                tagline: "Meet the Founder",
                name: "Ashish Yadav",
                title: "Lead Curator & Visionary",
                quote: "Your environment dictates your execution. We didn't just want to build offices; we wanted to engineer elite sanctuaries where Jaipur's most ambitious minds could accelerate without friction.",
                bioParagraph1: "Recognizing a massive gap in the luxury commercial and residential market, Ashish pioneered the \"Plug & Play Empire\" concept in Jaipur. His vision eliminates the chaotic months spent dealing with contractors, interior designers, and setup delays.",
                bioParagraph2: "Today, SM Prime Realty stands as the gold benchmark for premium, zero-delay real estate inside Jaipur.",
                image: "https://rtrlavnozuljuajhwamz.supabase.co/storage/v1/object/public/photoes/Gemini_Generated_Image_ue7nh5ue7nh5ue7n.png"
            },
            amenities: [
                { title: "Zero Setup Delay", desc: "Walk in, plug in, and start scaling. Fully furnished with ergonomic Herman Miller seating and robust high-speed infrastructure.", img: "https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&q=80&w=1600" },
                { title: "Architectural Grandeur", desc: "Designed by top-tier interior architects utilizing natural light, premium acoustics, and Vastu-compliant layouts for maximum productivity.", img: "https://images.unsplash.com/photo-1556800623-2895ab260a99?auto=format&fit=crop&q=80&w=1600" },
                { title: "Enterprise Security", desc: "Biometric access, 24/7 surveillance, and enterprise-grade network security protocols pre-installed to protect your assets.", img: "https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&q=80&w=1600" },
                { title: "Curated Environment", desc: "From premium coffee bars to dedicated wellness zones, every square foot is optimized for elite corporate culture.", img: "https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&q=80&w=1600" }
            ],
            projects: [
                { 
                    id: "project-1", 
                    title: "The Paragon Hub", 
                    type: "Commercial", 
                    size: "18,500 Sq Ft", 
                    location: "Vaishali Nagar", 
                    img: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1600", 
                    desc: "An avant-garde corporate enclave engineered for high-performance scale. Features curated custom-built lounges, bespoke workspaces, and top-tier amenities that allow fast-scaling brands to perform at peak capacity from day one.",
                    reelUrl: "https://www.instagram.com/reel/DW3Ow31kznq/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
                },
                { 
                    id: "project-2", 
                    title: "The Prestige Suites", 
                    type: "Residential", 
                    size: "5,800 Sq Ft", 
                    location: "C-Scheme", 
                    img: "https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?auto=format&fit=crop&q=80&w=1600", 
                    desc: "A breathtaking residential sanctuary where architectural heritage meets absolute modern refinement. Designed with premium high-end automation, Italian marbles, custom architectural glass panels, and absolute acoustic comfort.",
                    reelUrl: "https://www.instagram.com/reel/DWq8E8ik-Ud/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
                },
                { 
                    id: "project-3", 
                    title: "Aetherial Workspace", 
                    type: "Commercial", 
                    size: "12,000 Sq Ft", 
                    location: "DCM, Vaishali Nagar", 
                    img: "https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=1600", 
                    desc: "An ultra-premium corporate headquarter concept featuring private executive glass offices, modern conference rooms, custom library lounges, and built-in premium wellness hubs designed to inspire teams to build empires.",
                    reelUrl: "https://www.instagram.com/reel/DWoasYJk-sA/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
                },
                { 
                    id: "project-4", 
                    title: "The Zenith Office Suite", 
                    type: "Commercial", 
                    size: "9,200 Sq Ft", 
                    location: "Malviya Nagar", 
                    img: "https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&q=80&w=1600", 
                    desc: "Crafted exclusively for ambitious corporate operations, this fully-integrated workplace features a state-of-the-art security suite, custom layout modules, smart thermal controls, and panoramic vistas of Jaipur's prime skyline.",
                    reelUrl: "https://www.instagram.com/reel/DWi4H8bE2cX/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
                },
                { 
                    id: "project-5", 
                    title: "Monarch Penthouses", 
                    type: "Residential", 
                    size: "6,550 Sq Ft", 
                    location: "Bapu Nagar", 
                    img: "https://images.unsplash.com/photo-1600566753376-12c8ab7fb75b?auto=format&fit=crop&q=80&w=1600", 
                    desc: "An ultra-luxe residence with high ceilings, wrapping floor-to-ceiling glass windows, a private sunset terrace lounge, and carefully chosen custom art accents that cultivate an environment of absolute sophistication and tranquility.",
                    reelUrl: "https://www.instagram.com/reel/DWgUeX0E9G0/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
                }
            ],
            contact: {
                address1: "SM Tower 3 and 6",
                address2: "Baba market DCM",
                address3: "Vaishali Nagar, Jaipur",
                addressState: "Rajasthan, India",
                instagram: "@smprimerealty",
                instagramLink: "https://instagram.com/smprimerealty",
                phone: "+918696996609",
                phoneFormatted: "+91 8696996609"
            }
        };

        // --- Custom Trailing Cursor ---
        const CustomCursor = () => {
            const dotRef = useRef(null);
            const outlineRef = useRef(null);

            useEffect(() => {
                const moveCursor = (e) => {
                    gsap.to(dotRef.current, { x: e.clientX, y: e.clientY, duration: 0, ease: "none" });
                    gsap.to(outlineRef.current, { x: e.clientX, y: e.clientY, duration: 0.15, ease: "power2.out" });
                };
                const handleMouseOver = (e) => {
                    if (e.target.closest('button, a, input, select, textarea, .hover-trigger')) {
                        outlineRef.current.classList.add('hovered');
                    } else {
                        outlineRef.current.classList.remove('hovered');
                    }
                };
                window.addEventListener('mousemove', moveCursor);
                window.addEventListener('mouseover', handleMouseOver);
                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);

            return (
                <>
                    <div ref={dotRef} className="cursor-dot hidden md:block"></div>
                    <div ref={outlineRef} className="cursor-outline hidden md:block"></div>
                </>
            );
        };

        // --- Cinematic Custom Preloader ---
        const Preloader = ({ setLoading }) => {
            const containerRef = useRef(null);
            const textRef = useRef(null);

            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    const tl = gsap.timeline({
                        onComplete: () => {
                            gsap.to(containerRef.current, {
                                yPercent: -100,
                                duration: 1.2,
                                ease: "power4.inOut",
                                onComplete: () => setLoading(false)
                            });
                        }
                    });

                    tl.fromTo(textRef.current, { y: 100, opacity: 0 }, { y: 0, opacity: 1, duration: 1.2, ease: "power4.out", delay: 0.2 })
                      .to(textRef.current, { opacity: 0, duration: 0.5, delay: 0.6 });
                });
                return () => ctx.revert();
            }, []);

            return (
                <div ref={containerRef} className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-prime-pearl">
                    <div className="overflow-hidden">
                        <h1 ref={textRef} className="font-serif text-3xl md:text-5xl text-prime-ink tracking-[0.2em] uppercase text-center flex flex-col items-center gap-2">
                            <span>SM Prime</span>
                            <span className="italic text-prime-gold">Realty</span>
                        </h1>
                    </div>
                </div>
            );
        };

        // --- Elegant Floating Navigation Bar ---
        const Navbar = ({ onSectionScroll }) => {
            return (
                <nav className="fixed w-full top-0 z-50 px-6 py-6 md:px-12 flex justify-between items-center bg-gradient-to-b from-prime-pearl/95 to-transparent backdrop-blur-sm">
                    <div onClick={() => onSectionScroll('hero')} className="font-serif text-xl md:text-2xl tracking-[0.15em] uppercase text-prime-ink cursor-pointer hover-trigger flex flex-col">
                        <span>SM Prime</span>
                        <span className="text-[0.5em] font-sans tracking-[0.3em] text-prime-muted uppercase">Realty</span>
                    </div>
                    <div className="hidden md:flex space-x-10 text-[10px] font-semibold tracking-[0.2em] uppercase text-prime-ink">
                        {['Vision', 'Founder', 'Amenities', 'Portfolio', 'Connect'].map((tab) => (
                            <button 
                                key={tab} 
                                onClick={() => onSectionScroll(tab.toLowerCase())} 
                                className="hover:text-prime-gold transition-colors hover-trigger relative group"
                            >
                                {tab}
                                <span className="absolute -bottom-2 left-0 w-0 h-[1px] bg-prime-gold transition-all duration-300 group-hover:w-full"></span>
                            </button>
                        ))}
                    </div>
                    <button onClick={() => onSectionScroll('connect')} className="md:hidden text-xs tracking-widest uppercase border-b border-prime-ink pb-1 font-semibold">Connect</button>
                </nav>
            );
        };

        // --- Modern Hero Section with zoom parallax ---
        const Hero = ({ data }) => {
            const heroRef = useRef(null);

            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.from('.hero-title-line', {
                        y: 100,
                        opacity: 0,
                        duration: 1.4,
                        stagger: 0.15,
                        ease: 'power4.out',
                        delay: 1.8
                    });
                    gsap.from('.hero-sub', {
                        opacity: 0,
                        y: 20,
                        duration: 1,
                        delay: 2.4,
                        ease: 'power2.out'
                    });
                    gsap.to('.hero-bg', {
                        scale: 1.12,
                        duration: 22,
                        ease: 'none',
                        repeat: -1,
                        yoyo: true
                    });
                }, heroRef);
                return () => ctx.revert();
            }, []);

            return (
                <section id="hero" ref={heroRef} className="relative h-screen flex items-center justify-center overflow-hidden bg-prime-pearl">
                    <div className="absolute inset-0 z-0 overflow-hidden">
                        <img 
                            src={data?.bgImage || INITIAL_DEFAULT_CONFIG.hero.bgImage} 
                            alt="Luxury Workspace Exterior" 
                            className="hero-bg w-full h-full object-cover opacity-50 mix-blend-multiply grayscale-[20%]"
                            onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&q=80&w=2000" }}
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-prime-pearl via-transparent to-prime-pearl/30"></div>
                    </div>

                    <div className="relative z-10 text-center px-6 mt-16 flex flex-col items-center">
                        <h1 className="font-serif text-5xl md:text-8xl lg:text-9xl text-prime-ink leading-[0.95] tracking-tight flex flex-col md:flex-row gap-2 md:gap-6 overflow-hidden pb-4">
                            <span className="hero-title-line block transform">{data?.titleLine1}</span>
                            <span className="hero-title-line block italic text-prime-gold transform">{data?.titleLine2}</span>
                        </h1>
                        <p className="hero-sub mt-6 text-[11px] md:text-xs font-semibold tracking-[0.3em] text-prime-ink/80 uppercase max-w-lg mx-auto leading-relaxed">
                            {data?.subtitle}
                        </p>
                    </div>
                </section>
            );
        };

        // --- Location Marquee ---
        const Marquee = () => {
            const locations = ["C-Scheme", "Vaishali Nagar", "Malviya Nagar", "Jagatpura", "Bapu Nagar", "DCM"];
            return (
                <div className="py-8 border-y border-prime-ink/10 bg-prime-surface overflow-hidden select-none">
                    <div className="marquee-container">
                        <div className="marquee-content items-center">
                            {[...Array(4)].map((_, index) => (
                                <div key={index} className="flex items-center">
                                    {locations.map((loc, locIndex) => (
                                        <React.Fragment key={`${index}-${locIndex}`}>
                                            <span className="text-2xl md:text-3xl font-serif italic mx-8 text-prime-ink/80 whitespace-nowrap">{loc}</span>
                                            <span className="text-prime-gold text-lg mx-2">✦</span>
                                        </React.Fragment>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Strategic Vision Section ---
        const Vision = ({ data }) => {
            const sectionRef = useRef(null);

            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.from('.vision-reveal', {
                        scrollTrigger: { trigger: sectionRef.current, start: 'top 80%' },
                        y: 35, opacity: 0, duration: 1.1, stagger: 0.15, ease: 'power3.out'
                    });
                }, sectionRef);
                return () => ctx.revert();
            }, []);

            return (
                <section id="vision" ref={sectionRef} className="py-24 md:py-36 px-6 md:px-12 bg-prime-pearl relative z-10">
                    <div className="max-w-4xl mx-auto text-center">
                        <h3 className="vision-reveal text-prime-gold text-[10px] tracking-[0.3em] font-semibold uppercase mb-6">
                            {data?.tagline || INITIAL_DEFAULT_CONFIG.vision.tagline}
                        </h3>
                        <h2 className="vision-reveal font-serif text-3xl md:text-5xl text-prime-ink leading-snug mb-10">
                            {data?.headline || INITIAL_DEFAULT_CONFIG.vision.headline}
                        </h2>
                        <p className="vision-reveal text-prime-ink/70 font-light leading-relaxed text-sm md:text-base max-w-2xl mx-auto">
                            {data?.description || INITIAL_DEFAULT_CONFIG.vision.description}
                        </p>
                    </div>
                </section>
            );
        };

        // --- Curator Profile: Meet the Founder with 7-Tap Secret Door ---
        const Founder = ({ data, onPhotoClick }) => {
            const sectionRef = useRef(null);
            
            useLayoutEffect(() => {
                const ctx = gsap.context(() => {
                    gsap.from('.founder-reveal', {
                        y: 40, opacity: 0, duration: 1, stagger: 0.15, ease: "power3.out",
                        scrollTrigger: { trigger: sectionRef.current, start: "top 75%" }
                    });
                }, sectionRef);
                return () => ctx.revert();
            }, []);

            return (
                <section id="founder" ref={sectionRef} className="py-24 md:py-32 px-6 md:px-12 bg-prime-surface border-t border-prime-ink/5">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row-reverse gap-16 md:gap-24 items-center">
                        <div className="w-full md:w-1/2">
                            <h3 className="founder-reveal text-prime-gold text-[10px] tracking-[0.3em] font-semibold uppercase mb-4">
                                {data?.tagline}
                            </h3>
                            <h2 className="founder-reveal font-serif text-4xl md:text-5xl text-prime-ink leading-tight mb-2">
                                {data?.name}
                            </h2>
                            <p className="founder-reveal text-xs uppercase tracking-widest text-prime-muted font-medium mb-8">
                                {data?.title}
                            </p>
                            
                            <blockquote className="founder-reveal text-prime-ink/80 text-lg md:text-xl font-serif italic leading-relaxed mb-8 border-l-2 border-prime-gold pl-6">
                                "{data?.quote}"
                            </blockquote>
                            
                            <p className="founder-reveal text-prime-ink/70 leading-relaxed font-light mb-6 text-sm">
                                {data?.bioParagraph1}
                            </p>
                            <p className="founder-reveal text-prime-ink/70 leading-relaxed font-light text-sm">
                                {data?.bioParagraph2}
                            </p>
                        </div>
                        <div className="w-full md:w-1/2 founder-reveal relative">
                            {/* Tap 7 times secretly to unlock Curator Panel */}
                            <div 
                                onClick={onPhotoClick}
                                className="aspect-[3/4] rounded-xl overflow-hidden bg-prime-pearl relative shadow-sm cursor-pointer select-none group"
                                title="Tap 7 times to unlock Curator Panel"
                            >
                                <img 
                                    src={data?.image} 
                                    alt="Ashish Yadav - Founder of SM Prime Realty" 
                                    className="w-full h-full object-cover group-hover:scale-[1.02] transition-transform duration-700" 
                                    onError={(e) => { e.target.src = INITIAL_DEFAULT_CONFIG.founder.image }}
                                />
                                <div className="absolute inset-0 bg-gradient-to-t from-prime-ink/20 to-transparent"></div>
                                <div className="absolute bottom-4 left-4 bg-prime-pearl/80 backdrop-blur-sm px-2.5 py-1 rounded-full text-[8px] uppercase tracking-widest font-semibold text-prime-ink border border-prime-ink/5 opacity-0 group-hover:opacity-100 transition-opacity">
                                    Curator Mode Portal
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // --- Interactive Amenities accordion ---
        const Amenities = ({ items }) => {
            const [activeImg, setActiveImg] = useState(0);
            const amenitiesList = items || INITIAL_DEFAULT_CONFIG.amenities;

            return (
                <section id="amenities" className="py-24 md:py-36 px-6 md:px-12 bg-prime-pearl">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-16">
                        <div className="w-full md:w-1/2 md:sticky md:top-32 h-fit">

        // --- Dynamic Filterable Portfolio with Quick-View & cinematic tours ---

                        { opacity: 1, y: 0, duration: 0.6, stagger: 0.08, ease: "power2.out" }

                <section id="portfolio" className="py-24 md:py-36 px-6 md:px-12 bg-prime-surface">

                                <h3 className="text-prime-gold text-[10px] tracking-[0.3em] font-semibold uppercase mb-4">Curated Spaces</h3>

                            <div className="flex space-x-6 border-b border-prime-ink/10 pb-2">
                                {['All', 'Commercial', 'Residential'].map(cat => (

                                        key={cat}
                                        onClick={() => setFilter(cat)}

                                    >
                                        {cat}
                                        {filter === cat && <span className="absolute bottom-[-1px] left-0 w-full h-[1.5px] bg-prime-ink animate-pulse"></span>}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div ref={gridRef} className="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16">
                            {filtered.map((project) => (
                                <div key={project.id} className="group cursor-pointer hover-trigger" onClick={() => setSelectedProject(project)}>
                                    <div className="aspect-[4/3] rounded-xl mb-6 overflow-hidden bg-prime-pearl relative shadow-sm">
                                        <img 
                                            src={project.img} 
                                            alt={project.title} 
                                            className="w-full h-full object-cover transition-transform duration-[1.5s] ease-out group-hover:scale-[1.03]"

                                        <div className="absolute top-4 right-4 bg-prime-pearl/90 backdrop-blur-sm px-3 py-1.5 rounded-full border border-prime-ink/5 flex items-center space-x-1.5 shadow-sm">
                                            <span className="w-1.5 h-1.5 rounded-full bg-prime-gold animate-ping"></span>
                                            <span className="text-[8px] uppercase tracking-wider font-semibold text-prime-ink">Cinematic Tour Available</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-start px-1">
                                        <div>
                                            <h3 className="font-serif text-2xl md:text-3xl text-prime-ink mb-1 group-hover:text-prime-gold transition-colors">{project.title}</h3>
                                            <p className="text-prime-muted text-[10px] uppercase tracking-wider font-medium">{project.type}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs tracking-widest uppercase font-semibold text-prime-ink">{project.location}</p>
                                            <p className="text-prime-gold text-sm mt-1 font-serif italic">{project.size}</p>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Dynamic Cinematic Modal */}
                    {selectedProject && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-12 glass-modal transition-opacity duration-300">
                            <div className="bg-prime-pearl w-full max-w-5xl rounded-2xl overflow-hidden flex flex-col md:flex-row shadow-2xl relative border border-prime-ink/5 max-h-[90vh] md:max-h-none overflow-y-auto md:overflow-visible animate-[fadeIn_0.3s_forwards]">
                                <button onClick={() => setSelectedProject(null)} className="absolute top-4 right-4 z-10 w-10 h-10 bg-prime-surface border border-prime-ink/10 text-prime-ink rounded-full flex items-center justify-center hover-trigger hover:bg-prime-ink hover:text-prime-pearl transition-colors shadow-sm">✕</button>
                                <div className="w-full md:w-1/2 h-[30vh] md:h-[65vh] relative bg-prime-surface">
                                    <img 
                                        src={selectedProject.img} 
                                        alt={selectedProject.title} 
                                        className="w-full h-full object-cover" 
                                        onError={(e) => { e.target.src = "https://placehold.co/800x600/EFEFEA/111111?text=" + encodeURIComponent(selectedProject.title) }}

                                            <span className="text-prime-gold text-xl pl-1 group-hover:scale-105 transition-transform">▶</span>
                                        </a>
                                    </div>
                                </div>
                                <div className="w-full md:w-1/2 p-6 md:p-12 flex flex-col justify-center">

                                    <h3 className="font-serif text-3xl md:text-4.5xl text-prime-ink mb-4">{selectedProject.title}</h3>
                                    <p className="text-prime-ink/70 mb-6 leading-relaxed font-light text-xs md:text-sm">{selectedProject.desc}</p>

                                        </div>

                                        </div>
                                    </div>

                                        <a

                                            rel="noreferrer"

                                                window.open(`https://wa.me/${contactData?.phone?.replace('+', '')}?text=${encodeURIComponent(message)}`, '_blank');
                                            }}
                                            className="px-5 py-3.5 border border-prime-ink/20 text-prime-ink text-[10px] font-semibold tracking-widest uppercase hover:border-prime-gold hover:text-prime-gold transition-colors hover-trigger flex items-center justify-center rounded-lg"
                                        >
                                            Inquire Now
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </section>
            );
        };

        // --- Connect & Footer ---
        const Footer = ({ data }) => {
            const [formData, setFormData] = useState({ name: '', message: '' });
            const [error, setError] = useState('');

            const handleWhatsApp = (e) => {
                e.preventDefault();
                if (!formData.name.trim()) {
                    setError('Please enter your name to connect.');
                    return;
                }
                const cleanPhone = (data?.phone || INITIAL_DEFAULT_CONFIG.contact.phone).replace('+', '');
                const userMsg = formData.message.trim() ? ` ${formData.message}` : " I want to schedule a site tour.";
                const text = `Hello Ashish, I am ${formData.name}.${userMsg}`;
                window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(text)}`, '_blank');
                setError('');
            };

            const handleCall = (e) => {
                e.preventDefault();
                window.location.href = `tel:${data?.phone || INITIAL_DEFAULT_CONFIG.contact.phone}`;
            };

            return (
                <footer id="connect" className="bg-prime-ink text-prime-pearl py-20 md:py-28 px-6 md:px-12 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-96 h-96 bg-prime-gold/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>

                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start gap-16 relative z-10">
                        <div className="w-full md:w-1/2">
                            <h2 className="font-serif text-5xl md:text-7xl mb-6 leading-tight">Ready to <br/><span className="italic text-prime-gold">Elevate?</span></h2>
                            <p className="text-prime-pearl/60 max-w-sm mb-10 text-xs md:text-sm font-light">Bypass the construction delays. Connect with Ashish directly to claim your elite space in Jaipur.</p>
                            
                            <form className="max-w-md space-y-6">
                                <div>
                                    <input 
                                        type="text" 
                                        placeholder="Your Name *"
                                        value={formData.name}
                                        onChange={(e) => { setFormData({...formData, name: e.target.value}); setError(''); }}
                                        className="w-full bg-transparent border-b border-prime-pearl/20 pb-3 text-prime-pearl placeholder-prime-pearl/30 focus:outline-none focus:border-prime-gold transition-colors font-light text-sm rounded-none"
                                    />
                                    {error && <p className="text-red-400 text-[10px] mt-2 font-medium tracking-wide">{error}</p>}
                                </div>
                                <div>
                                    <input 
                                        type="text" 
                                        placeholder="What are you looking for? (Optional)"
                                        value={formData.message}
                                        onChange={(e) => setFormData({...formData, message: e.target.value})}
                                        className="w-full bg-transparent border-b border-prime-pearl/20 pb-3 text-prime-pearl placeholder-prime-pearl/30 focus:outline-none focus:border-prime-gold transition-colors font-light text-sm rounded-none"
                                    />
                                </div>
                                
                                <div className="flex flex-col sm:flex-row gap-4 pt-4">
                                    <button 
                                        onClick={handleWhatsApp}
                                        className="px-6 py-3.5 bg-prime-gold text-prime-ink text-[10px] font-semibold tracking-widest uppercase hover:bg-white transition-colors hover-trigger flex items-center justify-center gap-2 rounded-lg"
                                    >
                                        Connect on WhatsApp
                                    </button>
                                    <button 
                                        onClick={handleCall}
                                        className="px-6 py-3.5 border border-prime-pearl/20 text-prime-pearl text-[10px] font-semibold tracking-widest uppercase hover:border-prime-gold hover:text-prime-gold transition-colors hover-trigger flex items-center justify-center gap-2 rounded-lg"
                                    >
                                        Call Directly
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div className="w-full md:w-1/3 flex flex-col gap-10 pt-4">
                            <div>
                                <h4 className="text-prime-gold text-[10px] tracking-[0.2em] font-semibold uppercase mb-4">Corporate Office</h4>
                                <p className="text-prime-pearl/80 font-serif text-lg leading-relaxed">
                                    {data?.address1 || INITIAL_DEFAULT_CONFIG.contact.address1}<br/>
                                    {data?.address2 || INITIAL_DEFAULT_CONFIG.contact.address2}<br/>
                                    {data?.address3 || INITIAL_DEFAULT_CONFIG.contact.address3}<br/>
                                    {data?.addressState || INITIAL_DEFAULT_CONFIG.contact.addressState}
                                </p>
                            </div>
                            <div>
                                <h4 className="text-prime-gold text-[10px] tracking-[0.2em] font-semibold uppercase mb-4">Connect</h4>
                                <div className="flex flex-col space-y-3 text-prime-pearl/80 text-xs font-light">
                                    <a href={data?.instagramLink || INITIAL_DEFAULT_CONFIG.contact.instagramLink} target="_blank" rel="noreferrer" className="hover:text-prime-gold transition-colors hover-trigger flex items-center gap-2 w-fit">
                                        <span>{data?.instagram || INITIAL_DEFAULT_CONFIG.contact.instagram}</span> (Instagram)
                                    </a>
                                    <a href={`tel:${data?.phone || INITIAL_DEFAULT_CONFIG.contact.phone}`} className="hover:text-prime-gold transition-colors hover-trigger w-fit font-medium">
                                        {data?.phoneFormatted || INITIAL_DEFAULT_CONFIG.contact.phoneFormatted}
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div className="max-w-7xl mx-auto mt-20 pt-8 border-t border-prime-pearl/10 flex flex-col md:flex-row justify-between items-center text-[9px] tracking-widest text-prime-pearl/40 uppercase">
                        <p>© 2026 SM Prime Realty.</p>
                        <p className="mt-4 md:mt-0">Curated with utmost precision.</p>
                    </div>
                </footer>
            );
        };

        // --- Live CMS Curation Panel Drawer ---
        const AdminPanel = ({ currentConfig, onSaveConfig, onClose, isDatabaseConnected }) => {
            const [activeTab, setActiveTab] = useState('hero');
            const [config, setConfig] = useState(JSON.parse(JSON.stringify(currentConfig)));

            const updateHero = (key, val) => {
                setConfig(prev => ({ ...prev, hero: { ...prev.hero, [key]: val } }));
            };

            const updateVision = (key, val) => {
                setConfig(prev => ({ ...prev, vision: { ...prev.vision, [key]: val } }));
            };

            const updateFounder = (key, val) => {
                setConfig(prev => ({ ...prev, founder: { ...prev.founder, [key]: val } }));
            };

            const updateContact = (key, val) => {
                setConfig(prev => ({ ...prev, contact: { ...prev.contact, [key]: val } }));
            };

            const updateAmenity = (index, key, val) => {
                const updated = [...config.amenities];
                updated[index][key] = val;
                setConfig(prev => ({ ...prev, amenities: updated }));
            };

                updated[index][key] = val;
                setConfig(prev => ({ ...prev, projects: updated }));

                    id: 'project-' + Date.now(),
                    title: "New Premium Property",

                    reelUrl: "https://www.instagram.com/reel/DW3Ow31kznq/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
                };
                setConfig(prev => ({ ...prev, projects: [...prev.projects, newProj] }));
            };

            const removeProject = (index) => {
                const updated = config.projects.filter((_, idx) => idx !== index);
                setConfig(prev => ({ ...prev, projects: updated }));
            };

                <div className="fixed inset-y-0 right-0 z-[120] w-full max-w-2xl bg-prime-pearl shadow-2xl flex flex-col border-l border-prime-ink/10 text-prime-ink h-screen max-h-screen overflow-hidden animate-[slideIn_0.4s_cubic-bezier(0.16,1,0.3,1)]">

                                </span>
                            </div>
                        </div>

                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex border-b border-prime-ink/5 overflow-x-auto whitespace-nowrap bg-prime-pearl min-h-[48px] shrink-0">
                        {['hero', 'vision', 'founder', 'amenities', 'portfolio', 'contact'].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`px-5 py-3 text-[10px] tracking-widest uppercase font-semibold border-b-2 transition-colors hover-trigger ${activeTab === tab ? 'border-prime-gold text-prime-gold bg-prime-surface/20' : 'border-transparent text-prime-muted hover:text-prime-ink'}`}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    {/* Scrollable Form Workspace */}
                    <div className="flex-1 overflow-y-auto p-6 space-y-6" style={{ maxHeight: 'calc(100vh - 170px)' }}>
                        
                        {/* HERO */}
                        {activeTab === 'hero' && (
                            <div className="space-y-4">
                                <h3 className="font-serif text-lg border-b border-prime-ink/5 pb-2">Hero Visual Layout</h3>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Title Main Accent</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.hero.titleLine1} onChange={(e) => updateHero('titleLine1', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Title Secondary (Italic Gold)</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent font-serif italic focus:border-prime-gold focus:outline-none" value={config.hero.titleLine2} onChange={(e) => updateHero('titleLine2', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Sub-heading Slogan</label>
                                    <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-20 text-xs focus:border-prime-gold focus:outline-none" value={config.hero.subtitle} onChange={(e) => updateHero('subtitle', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Hero Background Image URL</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent text-xs focus:border-prime-gold focus:outline-none" value={config.hero.bgImage} onChange={(e) => updateHero('bgImage', e.target.value)} />
                                    <img src={config.hero.bgImage} className="mt-2 w-full h-32 object-cover rounded" onError={(e) => { e.target.src = "https://placehold.co/800x600/EFEFEA/111111?text=Preview" }} />
                                </div>
                            </div>
                        )}

                        {/* VISION */}
                        {activeTab === 'vision' && (
                            <div className="space-y-4">
                                <h3 className="font-serif text-lg border-b border-prime-ink/5 pb-2">Vision Statements</h3>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Tagline Label</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.vision.tagline} onChange={(e) => updateVision('tagline', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Impact Headline</label>
                                    <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-24 text-xs leading-relaxed focus:border-prime-gold focus:outline-none" value={config.vision.headline} onChange={(e) => updateVision('headline', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Vision Narrative Description</label>
                                    <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-32 text-xs leading-relaxed focus:border-prime-gold focus:outline-none" value={config.vision.description} onChange={(e) => updateVision('description', e.target.value)} />
                                </div>
                            </div>
                        )}

                        {activeTab === 'founder' && (
