                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Founder Name</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.founder.name} onChange={(e) => updateFounder('name', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Professional Title</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.founder.title} onChange={(e) => updateFounder('title', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Signature Direct Quote</label>
                                    <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-24 font-serif italic text-xs leading-relaxed focus:border-prime-gold focus:outline-none" value={config.founder.quote} onChange={(e) => updateFounder('quote', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Biography Paragraph 1</label>
                                    <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-24 text-xs leading-relaxed focus:border-prime-gold focus:outline-none" value={config.founder.bioParagraph1} onChange={(e) => updateFounder('bioParagraph1', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Biography Paragraph 2</label>
                                    <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-24 text-xs leading-relaxed focus:border-prime-gold focus:outline-none" value={config.founder.bioParagraph2} onChange={(e) => updateFounder('bioParagraph2', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Founder Photo URL</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent text-xs focus:border-prime-gold focus:outline-none" value={config.founder.image} onChange={(e) => updateFounder('image', e.target.value)} />
                                    <img src={config.founder.image} className="mt-2 h-44 w-32 object-cover rounded shadow" onError={(e) => { e.target.src = INITIAL_DEFAULT_CONFIG.founder.image }} />
                                </div>
                            </div>
                        )}

                        {/* AMENITIES */}
                        {activeTab === 'amenities' && (
                            <div className="space-y-6">
                                <h3 className="font-serif text-lg border-b border-prime-ink/5 pb-2">Uncompromising Standards</h3>
                                {config.amenities.map((item, index) => (
                                    <div key={index} className="p-4 bg-prime-surface/40 rounded-xl space-y-3 border border-prime-ink/5">
                                        <span className="text-[9px] font-bold tracking-widest text-prime-gold uppercase block">Standard #{index + 1}</span>
                                        <div>
                                            <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Feature Title</label>
                                            <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={item.title} onChange={(e) => updateAmenity(index, 'title', e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Description</label>
                                            <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-16 text-xs focus:border-prime-gold focus:outline-none" value={item.desc} onChange={(e) => updateAmenity(index, 'desc', e.target.value)} />
                                        </div>
                                        <div>
                                            <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Background Image URL</label>
                                            <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent text-xs focus:border-prime-gold focus:outline-none" value={item.img} onChange={(e) => updateAmenity(index, 'img', e.target.value)} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* PORTFOLIO */}
                        {activeTab === 'portfolio' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center border-b border-prime-ink/5 pb-2">
                                    <h3 className="font-serif text-lg">Real Estate Portfolio</h3>
                                    <button onClick={addProject} className="px-3 py-1.5 bg-prime-gold text-prime-ink text-[9px] font-semibold tracking-wider uppercase rounded hover:bg-prime-ink hover:text-prime-pearl transition-all hover-trigger">+ Add New Property</button>
                                </div>
                                
                                {config.projects.map((proj, index) => (
                                    <div key={proj.id || index} className="p-4 bg-prime-surface/40 rounded-xl space-y-4 border border-prime-ink/5 relative">
                                        <button onClick={() => removeProject(index)} className="absolute top-4 right-4 text-[10px] text-red-500 font-semibold tracking-wider hover:underline hover-trigger">DELETE CARD</button>
                                        <span className="text-[9px] font-bold tracking-widest text-prime-gold uppercase block">Property #{index + 1}</span>
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Property Title</label>
                                                <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={proj.title} onChange={(e) => updateProject(index, 'title', e.target.value)} />
                                            </div>
                                            <div>
                                                <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Category Type</label>
                                                <select className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none text-xs" value={proj.type} onChange={(e) => updateProject(index, 'type', e.target.value)}>
                                                    <option value="Commercial">Commercial</option>
                                                    <option value="Residential">Residential</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Zone Area Size</label>
                                                <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={proj.size} onChange={(e) => updateProject(index, 'size', e.target.value)} />
                                            </div>
                                            <div>
                                                <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Location Suburb</label>
                                                <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={proj.location} onChange={(e) => updateProject(index, 'location', e.target.value)} />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Detailed Description (Inside Modal)</label>
                                            <textarea className="w-full p-2 border border-prime-ink/10 rounded bg-transparent h-20 text-xs leading-relaxed focus:border-prime-gold focus:outline-none" value={proj.desc} onChange={(e) => updateProject(index, 'desc', e.target.value)} />
                                        </div>

                                        <div>
                                            <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">High-Res Card Image URL</label>
                                            <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent text-xs focus:border-prime-gold focus:outline-none" value={proj.img} onChange={(e) => updateProject(index, 'img', e.target.value)} />
                                        </div>

                                        <div>
                                            <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Instagram Cinematic Reel URL</label>
                                            <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent text-xs font-mono focus:border-prime-gold focus:outline-none" value={proj.reelUrl} onChange={(e) => updateProject(index, 'reelUrl', e.target.value)} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* CONTACT */}
                        {activeTab === 'contact' && (
                            <div className="space-y-4">
                                <h3 className="font-serif text-lg border-b border-prime-ink/5 pb-2">Footer Contact Details</h3>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Office Line Address 1</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.address1} onChange={(e) => updateContact('address1', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Office Line Address 2</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.address2} onChange={(e) => updateContact('address2', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Office Line Address 3</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.address3} onChange={(e) => updateContact('address3', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">State & Country Line</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.addressState} onChange={(e) => updateContact('addressState', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Instagram Username Display (e.g. @smprimerealty)</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.instagram} onChange={(e) => updateContact('instagram', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Direct Instagram Hyperlink</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent text-xs focus:border-prime-gold focus:outline-none" value={config.contact.instagramLink} onChange={(e) => updateContact('instagramLink', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">System Action Call Phone (Format: +91...)</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.phone} onChange={(e) => updateContact('phone', e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-[9px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Formatted Visual Phone (Format: +91 86...)</label>
                                    <input type="text" className="w-full p-2 border border-prime-ink/10 rounded bg-transparent focus:border-prime-gold focus:outline-none" value={config.contact.phoneFormatted} onChange={(e) => updateContact('phoneFormatted', e.target.value)} />
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer Actions */}
                    <div className="p-4 border-t border-prime-ink/10 bg-prime-surface flex gap-3 shrink-0">
                        <button 
                            onClick={() => onSaveConfig(config)}
                            className="flex-1 py-3 bg-prime-gold text-prime-ink text-[10px] font-bold tracking-widest uppercase hover:bg-prime-ink hover:text-prime-pearl transition-colors rounded-lg hover-trigger"
                        >
                            Publish Live Setup
                        </button>
                        <button 
                            onClick={onClose}
                            className="px-5 py-3 border border-prime-ink/10 text-prime-ink text-[10px] font-bold tracking-widest uppercase hover:bg-prime-ink hover:text-prime-pearl transition-colors rounded-lg hover-trigger"
                        >
                            Discard
                        </button>
                    </div>
                </div>
            );
        };

        // --- Main App Entrypoint with Instant Realtime Engine ---
        const App = () => {
            const [loading, setLoading] = useState(true);
            const [config, setConfig] = useState(INITIAL_DEFAULT_CONFIG);
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [showCredentialsModal, setShowCredentialsModal] = useState(false);
            const [enteredId, setEnteredId] = useState('');
            const [enteredPassword, setEnteredPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [showSuccessToast, setShowSuccessToast] = useState(false);
            const [toastMessage, setToastMessage] = useState('Website published and updated successfully!');
            const [firebaseConnected, setFirebaseConnected] = useState(false);
            const [founderTapCount, setFounderTapCount] = useState(0);

            // Cloud DB Connectors
            const dbRef = useRef(null);
            const docRef = useRef(null);

            // --- Realtime Firestore Sync Engine ---
            useEffect(() => {
                const initFirebase = async () => {
                    const FC = window.FirebaseConnector;
                    if (!FC) {
                        setLoading(false);
                        return;
                    }

                    try {
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sm-prime-realty-prod';
                        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                        const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

                        if (!firebaseConfig) {
                            setLoading(false);
                            return;
                        }

                        const app = FC.initializeApp(firebaseConfig);
                        const auth = FC.getAuth(app);
                        const db = FC.getFirestore(app);
                        dbRef.current = db;

                        // Secure Authentication Block (RULE 3)
                        let user = null;
                        if (initialToken) {
                            try {
                                const authResult = await FC.signInWithCustomToken(auth, initialToken);
                                user = authResult.user;
                            } catch (err) {
                                console.warn("Custom token failed, using anonymous...", err);
                                const authResult = await FC.signInAnonymously(auth);
                                user = authResult.user;
                            }
                        } else {
                            const authResult = await FC.signInAnonymously(auth);
                            user = authResult.user;
                        }

                        if (!user) {
                            console.error("Auth failed.");
                            setLoading(false);
                            return;
                        }

                        // Isolated configuration directory (RULE 1)
                        const configDocPath = FC.doc(db, 'artifacts', appId, 'public', 'data', 'config', 'sm-prime-live');
                        docRef.current = configDocPath;

                        // Live cloud sync channel
                        const unsubscribe = FC.onSnapshot(configDocPath, (docSnapshot) => {
                            if (docSnapshot.exists()) {
                                const liveData = docSnapshot.data();
                                setConfig(liveData);
                            } else {
                                // Default schema deployment
                                FC.setDoc(configDocPath, INITIAL_DEFAULT_CONFIG);
                            }
                            setFirebaseConnected(true);
                            setLoading(false);
                        }, (err) => {
                            console.error("Cloud Database Sync Error:", err);
                            setLoading(false);
                        });

                        return () => unsubscribe();
                    } catch (e) {
                        console.error("Firebase config missing or blocked:", e);
                        setLoading(false);
                    }
                };

                initFirebase();
            }, []);

            // --- Kinetic Smooth Scroll System ---
            useEffect(() => {
                const lenis = new Lenis({
                    duration: 1.2,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    direction: 'vertical',
                    gestureDirection: 'vertical',
                    smooth: true,
                    smoothTouch: false,
                    touchMultiplier: 1.8,
                });

                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);

                lenis.on('scroll', ScrollTrigger.update);
                gsap.ticker.add((time) => {
                    lenis.raf(time * 1000);
                });
                gsap.ticker.lagSmoothing(0, 0);

                return () => {
                    lenis.destroy();
                    gsap.ticker.remove(lenis.raf);
                };
            }, []);

            const handleScrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            const handleCredentialsSubmit = (e) => {
                e.preventDefault();
                // Secure Admin Credentials Validation (ashish / 86969)
                if (enteredId.trim().toLowerCase() === 'ashish' && enteredPassword === '86969') {
                    setShowCredentialsModal(false);
                    setIsAdminOpen(true);
                    setEnteredId('');
                    setEnteredPassword('');
                    setLoginError('');
                } else {
                    setLoginError('Invalid Username or Password. Access Denied.');
                }
            };

            const handlePublishConfigChanges = async (newConfig) => {
                if (docRef.current && window.FirebaseConnector) {
                    try {
                        const FC = window.FirebaseConnector;
                        const auth = FC.getAuth();
                        if (!auth.currentUser) {
                            console.error("Unauthorized operation.");
                            return;
                        }

                        // Save directly and persistently to our cloud database (RULE 1)
                        await FC.setDoc(docRef.current, newConfig);
                        setConfig(newConfig);
                        setIsAdminOpen(false);
                        
                        setToastMessage("Website published and updated successfully on live servers!");
                        setShowSuccessToast(true);
                        setTimeout(() => setShowSuccessToast(false), 4000);
                    } catch (err) {
                        console.error("Failed to sync setup with database:", err);
                        setToastMessage("Sync Error: Cloud write failed.");
                        setShowSuccessToast(true);
                        setTimeout(() => setShowSuccessToast(false), 4000);
                    }
                } else {
                    setConfig(newConfig);
                    setIsAdminOpen(false);
                    setToastMessage("Updated successfully (Offline Preview Mode)!");
                    setShowSuccessToast(true);
                    setTimeout(() => setShowSuccessToast(false), 4000);
                }
            };

            const handleRestoreOriginalDefaults = async () => {
                if (docRef.current && window.FirebaseConnector) {
                    try {
                        await window.FirebaseConnector.setDoc(docRef.current, INITIAL_DEFAULT_CONFIG);
                        setConfig(INITIAL_DEFAULT_CONFIG);
                        setIsAdminOpen(false);
                        setToastMessage("Factory layout restored on live servers successfully!");
                        setShowSuccessToast(true);
                        setTimeout(() => setShowSuccessToast(false), 4000);
                    } catch (err) {
                        console.error("Restoring operation encountered database error:", err);
                    }
                } else {
                    setConfig(INITIAL_DEFAULT_CONFIG);
                    setIsAdminOpen(false);
                }
            };

            // Secret Door: Opening Admin login directly on 7 Portrait Taps
            const handleFounderPhotoClick = () => {
                setFounderTapCount(prev => {
                    const nextCount = prev + 1;
                    if (nextCount === 7) {
                        setShowCredentialsModal(true);
                        setToastMessage("Secret Gate Found! Access Verification Required.");
                        setShowSuccessToast(true);
                        setTimeout(() => setShowSuccessToast(false), 4000);
                        return 0;
                    }
                    
                    setToastMessage(`Secret Door: Tap ${7 - nextCount} more times...`);
                    setShowSuccessToast(true);
                    setTimeout(() => setShowSuccessToast(false), 1200);
                    return nextCount;
                });
            };

            return (
                <div className="relative selection:bg-prime-gold/30 selection:text-prime-ink">
                    <CustomCursor />
                    {loading && <Preloader setLoading={setLoading} />}
                    
                    <Navbar onSectionScroll={handleScrollToSection} />

                    <main className={loading ? 'opacity-0' : 'opacity-100 transition-opacity duration-1000'}>
                        <Hero data={config.hero} />
                        <Marquee />
                        <Vision data={config.vision} />
                        <Founder data={config.founder} onPhotoClick={handleFounderPhotoClick} />
                        <Amenities items={config.amenities} />
                        <Portfolio items={config.projects} contactData={config.contact} />
                    </main>

                    <Footer data={config.contact} />

                    {/* Interactive floating lock key */}
                    <button 
                        onClick={() => setShowCredentialsModal(true)} 
                        className="fixed bottom-6 right-6 z-[90] w-12 h-12 bg-prime-pearl border border-prime-ink/10 rounded-full flex items-center justify-center hover-trigger shadow-lg hover:bg-prime-ink hover:text-prime-pearl transition-colors duration-300 group"
                        title="Secure Admin Access"
                    >
                        <svg className="w-5 h-5 fill-current transition-transform duration-300 group-hover:scale-110" viewBox="0 0 24 24">
                            <path d="M12 2C8.69 2 6 4.69 6 8v4c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-6c0-1.1-.9-2-2-2V8c0-3.31-2.69-6-6-6zm-4 6c0-2.21 1.79-4 4-4s4 1.79 4 4v4H8V8zm8 12H8v-6h8v6zm-4-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                        </svg>
                    </button>

                    {/* Secure Admin Credentials Login Modal */}
                    {showCredentialsModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 glass-modal animate-[fadeIn_0.3s_forwards]">
                            <style>{`@keyframes fadeIn { to { opacity: 1; } }`}</style>
                            <form onSubmit={handleCredentialsSubmit} className="bg-prime-pearl border border-prime-ink/10 rounded-2xl p-8 max-w-sm w-full shadow-2xl flex flex-col items-center">
                                <span className="text-prime-gold text-[10px] tracking-[0.3em] font-semibold uppercase mb-2">Secure Authentication Gate</span>
                                <h3 className="font-serif text-2xl text-prime-ink mb-6 text-center">Admin Access</h3>
                                
                                <div className="w-full space-y-4 mb-4">
                                    <div>
                                        <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">ID</label>
                                        <input 
                                            type="text"
                                            value={enteredId}
                                            onChange={(e) => setEnteredId(e.target.value)}
                                            placeholder="Enter Admin ID"
                                            className="w-full text-xs bg-transparent border-b border-prime-ink/20 pb-2 focus:outline-none focus:border-prime-gold transition-colors text-prime-ink font-mono"
                                            required
                                            autoFocus
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[8px] uppercase tracking-wider font-semibold text-prime-muted mb-1">Password</label>
                                        <input 
                                            type="password"
                                            value={enteredPassword}
                                            onChange={(e) => setEnteredPassword(e.target.value)}
                                            placeholder="•••••"
                                            className="w-full text-xs bg-transparent border-b border-prime-ink/20 pb-2 focus:outline-none focus:border-prime-gold transition-colors text-prime-ink tracking-widest font-mono"
                                            required
                                        />
                                    </div>
                                </div>

                                {loginError && (
                                    <p className="text-red-500 text-[9px] tracking-wide uppercase font-semibold mb-4 text-center">{loginError}</p>
                                )}

                                <div className="flex gap-3 w-full mt-4">
                                    <button 
                                        type="submit"
                                        className="flex-1 py-3 bg-prime-ink text-prime-pearl text-[10px] font-bold tracking-widest uppercase hover:bg-prime-gold hover:text-prime-ink transition-colors rounded-lg hover-trigger"
                                    >
                                        Authorize
                                    </button>
                                    <button 
                                        type="button"
                                        onClick={() => { setShowCredentialsModal(false); setEnteredId(''); setEnteredPassword(''); setLoginError(''); }}
                                        className="px-5 py-3 border border-prime-ink/10 text-prime-ink text-[10px] font-bold tracking-widest uppercase hover:bg-prime-ink hover:text-prime-pearl transition-colors rounded-lg hover-trigger"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* Live Curation Editing Panel */}
                    {isAdminOpen && (
                        <AdminPanel 
                            currentConfig={config} 
                            onSaveConfig={handlePublishConfigChanges} 
                            onClose={() => setIsAdminOpen(false)} 
                            isDatabaseConnected={firebaseConnected}
                        />
                    )}

                    {/* System Action Toasts */}
                    {showSuccessToast && (
                        <div className="fixed bottom-6 left-6 z-[130] bg-prime-ink text-prime-pearl border border-prime-gold/30 rounded-xl px-6 py-4 flex flex-col gap-1 shadow-2xl animate-[slideUp_0.4s_ease-out]">
                            <style>{`@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }`}</style>
                            <span className="text-[9px] font-semibold tracking-widest uppercase text-prime-gold">System Notification</span>
                            <p className="text-[11px] font-medium tracking-wider">{toastMessage}</p>
                        </div>
                    )}

                    {/* Master Reset Button */}
                    {isAdminOpen && (
                        <button 
                            onClick={handleRestoreOriginalDefaults}
                            className="fixed bottom-6 left-6 z-[140] bg-red-600 hover:bg-red-800 text-white text-[9px] font-bold tracking-widest uppercase px-4 py-2.5 rounded-lg shadow-2xl hover-trigger transition-all"
                            title="Reset layout back to curated default templates"
                        >
                            Reset Factory Layout
                        </button>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
